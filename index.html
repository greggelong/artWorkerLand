<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dystopian Wasteland — No Jump Button</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            overflow: hidden;
            background: #1a1a1a;
            font-family: 'Courier New', monospace;
        }

        #hud {
            position: absolute;
            top: 12px;
            left: 12px;
            color: #ff4400;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #ff4400;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 13px;
            z-index: 100;
            text-shadow: 0 0 8px #ff4400;
            line-height: 1.7;
            pointer-events: none;
        }

        #warning {
            position: absolute;
            top: 12px;
            right: 12px;
            color: #ffcc00;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffcc00;
            padding: 8px 14px;
            font-size: 13px;
            z-index: 100;
            font-weight: bold;
            animation: blink 1.4s infinite;
            text-shadow: 0 0 8px #ffcc00;
            pointer-events: none;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4400;
            font-size: 20px;
            z-index: 100;
            opacity: 0.7;
            pointer-events: none;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4400;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 4px;
            text-align: center;
            text-shadow: 0 0 20px #ff4400;
            z-index: 200;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px 40px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }

        #loading::after {
            content: '';
            display: block;
            width: 50px;
            height: 50px;
            margin: 16px auto 0;
            border: 3px solid #333;
            border-top-color: #ff4400;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* TOUCH CONTROLS - inset from edges to avoid system gestures */
        .joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            background: rgba(30, 30, 40, 0.75);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 100, 0, 0.8);
            border-radius: 50%;
            touch-action: none;
            z-index: 300;
            display: none;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .joystick-knob {
            position: absolute;
            width: 48px;
            height: 48px;
            background: rgba(255, 100, 0, 0.9);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px #ff6600;
            transition: transform 0.02s linear;
            will-change: transform;
        }

        /* Move joystick (left) - inset 30px from left edge */
        #joy-move {
            left: 30px;
            bottom: 30px;
        }

        /* Look joystick (right) - inset 30px from right edge */
        #joy-look {
            right: 30px;
            bottom: 30px;
        }

        /* Responsive adjustments for smaller screens */
        @media (max-width: 768px) {
            .joystick-base {
                width: 100px;
                height: 100px;
            }

            .joystick-knob {
                width: 40px;
                height: 40px;
            }

            #joy-move {
                left: 20px;
                bottom: 20px;
            }

            #joy-look {
                right: 20px;
                bottom: 20px;
            }

            #hud {
                font-size: 9px;
                top: 6px;
                left: 6px;
            }
        }

        /* Larger touch devices (tablets) get extra inset */
        @media (min-width: 769px) and (pointer: coarse) {
            .joystick-base {
                width: 130px;
                height: 130px;
            }

            #joy-move {
                left: 40px;
                bottom: 40px;
            }

            #joy-look {
                right: 40px;
                bottom: 40px;
            }
        }

        /* Desktop hint (only shown when no touch) */
        .desktop-hint {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffcc00;
            background: rgba(0, 0, 0, 0.75);
            border: 1px solid #ffcc00;
            padding: 8px 18px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            z-index: 200;
            letter-spacing: 1px;
            border-radius: 40px;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            pointer-events: none;
            transition: opacity 0.3s;
        }
    </style>
</head>

<body>
    <div id="hud">
        ▲ WASD / ARROWS: Move<br>
        ● SPACE: Jump (keyboard only)<br>
        ■ SHIFT: Sprint<br>
        ✦ CLICK: Look
    </div>
    <div id="warning">⚠ DANGER ZONE — ART WORKER ONLY</div>
    <div id="crosshair">+</div>
    <div id="loading">ENTERING SECTOR L7<br><span style="font-size:14px;opacity:0.6">LOADING WASTELAND...</span></div>

    <!-- Touch Joysticks (no jump button) -->
    <div id="joy-move" class="joystick-base">
        <div id="joy-move-knob" class="joystick-knob"></div>
    </div>
    <div id="joy-look" class="joystick-base">
        <div id="joy-look-knob" class="joystick-knob"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        (function () {
            // ---------- TOUCH DETECTION (works on desktop touchscreens) ----------
            const hasMaxTouch = (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);
            const hasOntouchStart = ('ontouchstart' in window);
            const coarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
            const isTouchDevice = hasMaxTouch || hasOntouchStart || coarsePointer;
            const showTouchControls = isTouchDevice;
            const isDesktopNoTouch = !showTouchControls;
            const isMobile = showTouchControls; // compatibility flag

            // ---------- THREE.JS SETUP ----------
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1a1008, 0.018);
            scene.background = new THREE.Color(0x1a1008);

            const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 300);
            camera.position.set(0, 2.2, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.1;
            document.body.appendChild(renderer.domElement);

            setTimeout(() => document.getElementById('loading').style.display = 'none', 1200);

            // ---------- LIGHTING ----------
            scene.add(new THREE.AmbientLight(0x554433, 2.2));
            const sun = new THREE.DirectionalLight(0xff9944, 1.1);
            sun.position.set(-30, 60, -20);
            sun.castShadow = true;
            sun.shadow.camera.left = -80; sun.shadow.camera.right = 80;
            sun.shadow.camera.top = 80; sun.shadow.camera.bottom = -80;
            sun.shadow.camera.far = 200;
            scene.add(sun);

            const fillLight = new THREE.DirectionalLight(0x885522, 0.8);
            fillLight.position.set(30, 10, 30);
            scene.add(fillLight);

            const torch = new THREE.SpotLight(0xfff5cc, 2.5, 50, Math.PI / 7, 0.4, 1.2);
            torch.position.set(0, 0, 0);
            camera.add(torch);
            const torchTarget = new THREE.Object3D();
            torchTarget.position.set(0, 0, -10);
            camera.add(torchTarget);
            torch.target = torchTarget;
            scene.add(camera);

            // ---------- MATERIALS ----------
            const concreteMat = new THREE.MeshLambertMaterial({ color: 0x5a5550 });
            const darkConcrete = new THREE.MeshLambertMaterial({ color: 0x38322e });
            const brickMat = new THREE.MeshLambertMaterial({ color: 0x7a3a2a });
            const darkBrick = new THREE.MeshLambertMaterial({ color: 0x4a2218 });
            const steelMat = new THREE.MeshPhongMaterial({ color: 0x445566, shininess: 60 });
            const rustMat = new THREE.MeshLambertMaterial({ color: 0x7a3a1a });
            const groundMat = new THREE.MeshLambertMaterial({ color: 0x2a2018 });
            const dirtMat = new THREE.MeshLambertMaterial({ color: 0x3a2e1a });
            const boneMat = new THREE.MeshLambertMaterial({ color: 0xd4c9a8 });
            const warnYellow = new THREE.MeshLambertMaterial({ color: 0xffcc00 });
            const warnBlack = new THREE.MeshLambertMaterial({ color: 0x111111 });
            const hardhatMat = new THREE.MeshPhongMaterial({ color: 0xffaa00, shininess: 80 });
            const glassMat = new THREE.MeshPhongMaterial({ color: 0x334455, transparent: true, opacity: 0.4, shininess: 120 });
            const emberMat = new THREE.MeshPhongMaterial({ color: 0xff3300, emissive: 0xff2200, emissiveIntensity: 0.6 });

            function rnd(a, b) { return a + Math.random() * (b - a); }
            function rndInt(a, b) { return Math.floor(rnd(a, b + 1)); }

            // ---------- WORLD OBJECT GENERATORS ----------
            function createBrick(x, y, z, rx = 0, ry = 0) {
                const g = new THREE.BoxGeometry(rnd(0.4, 0.9), rnd(0.25, 0.45), rnd(0.4, 0.75));
                const m = new THREE.Mesh(g, Math.random() > 0.4 ? brickMat : darkBrick);
                m.position.set(x, y, z);
                m.rotation.set(rx, ry, rnd(-0.3, 0.3));
                m.castShadow = true; m.receiveShadow = true;
                return m;
            }

            function createBrickPile(x, z) {
                const g = new THREE.Group();
                const count = rndInt(8, 20);
                for (let i = 0; i < count; i++) g.add(createBrick(rnd(-1.5, 1.5), rnd(0, 1.2), rnd(-1.5, 1.5)));
                g.position.set(x, 0, z);
                return g;
            }

            function createRuinedBuilding(x, z, w, d, fullH, demolishFraction) {
                const g = new THREE.Group();
                const floorCount = rndInt(3, 8);
                const floorH = fullH / floorCount;
                for (let f = 0; f < floorCount; f++) {
                    const survive = (f / floorCount) < (1 - demolishFraction);
                    if (!survive && Math.random() > 0.3) continue;
                    const fw = survive ? w : w * rnd(0.4, 0.9);
                    const fd = survive ? d : d * rnd(0.4, 0.9);
                    const fh = floorH * rnd(0.7, 1.0);
                    const wallMat = Math.random() > 0.5 ? concreteMat : darkConcrete;
                    const walls = [
                        [fw, fh, 0.35, 0, f * floorH + fh / 2, -(fd / 2)],
                        [fw, fh, 0.35, 0, f * floorH + fh / 2, (fd / 2)],
                        [0.35, fh, fd, -(fw / 2), f * floorH + fh / 2, 0],
                        [0.35, fh, fd, (fw / 2), f * floorH + fh / 2, 0],
                    ];
                    walls.forEach(([ww, wh, wd, wx, wy, wz]) => {
                        const wm = new THREE.Mesh(new THREE.BoxGeometry(ww, wh, wd), wallMat);
                        wm.position.set(wx, wy, wz);
                        wm.castShadow = true; wm.receiveShadow = true;
                        g.add(wm);
                    });
                    if (f > 0) {
                        const slab = new THREE.Mesh(new THREE.BoxGeometry(fw, 0.2, fd), darkConcrete);
                        slab.position.set(0, f * floorH, 0);
                        slab.receiveShadow = true;
                        g.add(slab);
                    }
                    if (survive && fw > 3) {
                        for (let wi = 0; wi < rndInt(1, 3); wi++) {
                            const wf = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.6, 0.1), Math.random() > 0.5 ? glassMat : darkConcrete);
                            wf.position.set(rnd(-fw / 2 + 1, fw / 2 - 1), f * floorH + floorH * 0.5, fd / 2 + 0.1);
                            g.add(wf);
                        }
                    }
                    if (!survive) {
                        for (let r = 0; r < rndInt(2, 5); r++) {
                            const rb = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, rnd(1, 3), 5), steelMat);
                            rb.position.set(rnd(-fw / 2, fw / 2), f * floorH + rnd(0, 1.5), rnd(-fd / 2, fd / 2));
                            rb.rotation.set(rnd(-0.4, 0.4), 0, rnd(-0.4, 0.4));
                            g.add(rb);
                        }
                    }
                }
                for (let i = 0; i < rndInt(5, 12); i++) g.add(createBrick(rnd(-w, w), rnd(0, 0.5), rnd(-d, d)));
                g.position.set(x, 0, z);
                return g;
            }

            function createSteelBeam(x, y, z, len, rx, ry, rz) {
                const m = new THREE.Mesh(new THREE.BoxGeometry(0.3, len, 0.3), Math.random() > 0.5 ? steelMat : rustMat);
                m.position.set(x, y, z);
                m.rotation.set(rx, ry, rz);
                m.castShadow = true;
                return m;
            }

            function createGiantRibcage(x, z) {
                const g = new THREE.Group();
                const spine = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 24, 8), boneMat);
                spine.rotation.z = Math.PI / 2;
                spine.position.y = 1.5;
                spine.castShadow = true;
                g.add(spine);
                for (let i = 0; i < 8; i++) {
                    const t = (i / 8 - 0.5) * 24 * 0.85;
                    const ribH = rnd(5, 9);
                    const pts = [];
                    for (let s = 0; s <= 10; s++) {
                        const a = (s / 10) * Math.PI;
                        pts.push(new THREE.Vector3(Math.sin(a) * rnd(3.5, 5.5), Math.cos(a) * ribH * 0.5 + ribH * 0.5, 0));
                    }
                    const curve = new THREE.CatmullRomCurve3(pts);
                    const rib = new THREE.Mesh(new THREE.TubeGeometry(curve, 12, 0.18, 6, false), boneMat);
                    rib.position.set(t, 1.5, 0);
                    rib.castShadow = true;
                    g.add(rib);
                    const rib2 = rib.clone();
                    rib2.scale.x = -1;
                    g.add(rib2);
                }
                const skull = new THREE.Mesh(new THREE.SphereGeometry(2.5, 10, 8), boneMat);
                skull.scale.set(1.2, 0.9, 1.5);
                skull.position.set(24 / 2 + 2, 2.5, 0);
                g.add(skull);
                [1, -1].forEach(side => {
                    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.7, 8, 6), new THREE.MeshLambertMaterial({ color: 0x111111 }));
                    eye.position.set(24 / 2 + 3.5, 3.2, side * 1.3);
                    g.add(eye);
                });
                g.position.set(x, 0, z);
                g.rotation.y = rnd(0, Math.PI * 2);
                return g;
            }

            function createGiantSpine(x, z) {
                const g = new THREE.Group();
                const count = rndInt(6, 12);
                for (let i = 0; i < count; i++) {
                    const v = new THREE.Mesh(new THREE.SphereGeometry(rnd(0.5, 1.0), 8, 6), boneMat);
                    v.position.set(i * rnd(1.2, 2), rnd(0.3, 1.5), rnd(-0.5, 0.5));
                    v.castShadow = true;
                    g.add(v);
                    if (Math.random() > 0.4) {
                        const sp = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.15, rnd(0.8, 2), 5), boneMat);
                        sp.position.set(i * rnd(1.2, 2), rnd(1, 2.5), rnd(-0.3, 0.3));
                        sp.rotation.set(rnd(-0.3, 0.3), 0, rnd(-0.2, 0.2));
                        g.add(sp);
                    }
                }
                g.position.set(x, 0, z);
                g.rotation.y = rnd(0, Math.PI * 2);
                return g;
            }

            // SIGN WITH IMAGE ARRAY (single image 'aw.jpg' for now)
            const signImages = ['aw.jpg', 'a.jpg', 'b.jpg', 'c.jpg', 'd.png', 'e.png', 'f.jpg', 'g.jpg', 'h.jpg', 'i.jpg'];   // add more filenames later if desired

            function createArtWorkersSign(x, z) {
                const g = new THREE.Group();
                [-1.8, 1.8].forEach(px => {
                    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 5.5, 6), steelMat);
                    post.position.set(px, 2.75, 0);
                    post.castShadow = true;
                    g.add(post);
                });
                const board = new THREE.Mesh(new THREE.BoxGeometry(4.2, 1.8, 0.12), new THREE.MeshLambertMaterial({ color: 0x1a1a1a }));
                board.position.set(0, 4.2, 0);
                g.add(board);
                const frame = new THREE.Mesh(new THREE.BoxGeometry(4.4, 2.0, 0.08), warnYellow);
                frame.position.set(0, 4.2, -0.03);
                g.add(frame);

                const randomIndex = Math.floor(Math.random() * signImages.length);
                const selectedImage = signImages[randomIndex];
                const textureLoader = new THREE.TextureLoader();
                const imgTex = textureLoader.load(selectedImage, undefined, undefined, err => console.warn(`Failed to load ${selectedImage}`, err));
                imgTex.encoding = THREE.sRGBEncoding;
                const imgMat = new THREE.MeshStandardMaterial({ map: imgTex });
                const imgPlane = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.6), imgMat);
                imgPlane.position.set(0, 4.2, 0.13);
                g.add(imgPlane);

                for (let i = 0; i < 7; i++) {
                    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.35, 0.1), i % 2 === 0 ? warnYellow : warnBlack);
                    stripe.position.set(-1.5 + i * 0.5, 3.4, 0.01);
                    g.add(stripe);
                }
                g.rotation.y = rnd(-0.2, 0.2);
                g.rotation.z = rnd(-0.05, 0.05);
                g.position.set(x, 0, z);
                return g;
            }

            function createWarningSign(x, z, ry = 0) {
                const g = new THREE.Group();
                const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 4, 6), steelMat);
                post.position.y = 2;
                g.add(post);
                const board = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 0.08), warnYellow);
                board.position.y = 3.8;
                g.add(board);
                for (let i = 0; i < 4; i++) {
                    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.35, 1, 0.09), i % 2 === 0 ? warnBlack : warnYellow);
                    stripe.position.set(-0.8 + i * 0.5, 3.8, 0);
                    g.add(stripe);
                }
                g.rotation.y = ry;
                g.rotation.z = rnd(-0.15, 0.15);
                g.position.set(x, 0, z);
                return g;
            }

            function createHardhat(x, y, z, ry = 0) {
                const g = new THREE.Group();
                const dome = new THREE.Mesh(new THREE.SphereGeometry(0.4, 10, 8, 0, Math.PI * 2, 0, Math.PI * 0.55), hardhatMat);
                dome.position.y = 0.1;
                g.add(dome);
                const brim = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.08, 12), hardhatMat);
                g.add(brim);
                g.position.set(x, y, z);
                g.rotation.set(rnd(-0.5, 0.5), ry, rnd(-0.5, 0.5));
                return g;
            }

            function createFireBarrel(x, z) {
                const g = new THREE.Group();
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.55, 1.4, 10), rustMat);
                barrel.position.y = 0.7;
                barrel.castShadow = true;
                g.add(barrel);
                [0.4, 0.9, 1.2].forEach(hy => {
                    const hoop = new THREE.Mesh(new THREE.TorusGeometry(0.63, 0.04, 6, 12), steelMat);
                    hoop.rotation.x = Math.PI / 2;
                    hoop.position.y = hy;
                    g.add(hoop);
                });
                const fireLight = new THREE.PointLight(0xff4400, 1.5, 12);
                fireLight.position.y = 2;
                g.add(fireLight);
                const ember = new THREE.Mesh(new THREE.SphereGeometry(0.3, 6, 5), emberMat);
                ember.position.y = 1.6;
                g.add(ember);
                g.position.set(x, 0, z);
                return g;
            }

            function createCraneArm(x, z) {
                const g = new THREE.Group();
                const tower = new THREE.Mesh(new THREE.BoxGeometry(1.2, 20, 1.2), steelMat);
                tower.position.y = 10;
                tower.castShadow = true;
                g.add(tower);
                const arm = new THREE.Mesh(new THREE.BoxGeometry(18, 0.5, 0.5), steelMat);
                arm.position.set(5, 20, 0);
                arm.castShadow = true;
                g.add(arm);
                const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 8, 4), steelMat);
                cable.position.set(10, 16, 0);
                g.add(cable);
                const hook = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.1, 6, 8, Math.PI), steelMat);
                hook.position.set(10, 11.5, 0);
                hook.rotation.z = Math.PI;
                g.add(hook);
                g.position.set(x, 0, z);
                g.rotation.y = rnd(0, Math.PI * 2);
                return g;
            }

            function createScaffold(x, z, h = 10, w = 6) {
                const g = new THREE.Group();
                const floors = Math.floor(h / 2.5);
                for (let f = 0; f <= floors; f++) {
                    const y = f * 2.5;
                    [[-w / 2, 0], [w / 2, 0], [0, -w / 2], [0, w / 2]].forEach(([bx, bz]) => {
                        const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, w, 5), steelMat);
                        bar.position.set(bx, y, bz);
                        bar.rotation.z = bx !== 0 ? Math.PI / 2 : 0;
                        bar.rotation.x = bz !== 0 ? Math.PI / 2 : 0;
                        g.add(bar);
                    });
                }
                [[-w / 2, -w / 2], [w / 2, -w / 2], [-w / 2, w / 2], [w / 2, w / 2]].forEach(([px, pz]) => {
                    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, h, 5), rustMat);
                    pole.position.set(px, h / 2, pz);
                    g.add(pole);
                });
                g.position.set(x, 0, z);
                return g;
            }

            // ---------- CHUNK MANAGEMENT ----------
            const CHUNK = 60;
            const chunks = new Map(), loaded = new Set();

            function createChunk(cx, cz) {
                const g = new THREE.Group();
                const ground = new THREE.Mesh(new THREE.PlaneGeometry(CHUNK, CHUNK, 8, 8), Math.random() > 0.5 ? groundMat : dirtMat);
                ground.rotation.x = -Math.PI / 2;
                ground.receiveShadow = true;
                g.add(ground);
                for (let i = 0; i < rndInt(2, 5); i++) {
                    const patch = new THREE.Mesh(new THREE.PlaneGeometry(rnd(3, 10), rnd(3, 8)), concreteMat);
                    patch.rotation.x = -Math.PI / 2;
                    patch.position.set(rnd(-CHUNK / 2, CHUNK / 2), 0.02, rnd(-CHUNK / 2, CHUNK / 2));
                    g.add(patch);
                }
                const buildingCount = rndInt(1, 3);
                for (let i = 0; i < buildingCount; i++) {
                    g.add(createRuinedBuilding(rnd(-20, 20), rnd(-20, 20), rnd(5, 14), rnd(5, 14), rnd(8, 25), rnd(0.2, 0.8)));
                }
                if (Math.random() > 0.45) g.add(createGiantRibcage(rnd(-18, 18), rnd(-18, 18)));
                if (Math.random() > 0.5) g.add(createGiantSpine(rnd(-18, 18), rnd(-18, 18)));
                for (let i = 0; i < rndInt(2, 6); i++) g.add(createSteelBeam(rnd(-22, 22), rnd(0.2, 0.8), rnd(-22, 22), rnd(3, 10), rnd(-0.4, 0.4), rnd(0, Math.PI), rnd(-0.4, 0.4)));
                for (let i = 0; i < rndInt(2, 5); i++) g.add(createBrickPile(rnd(-22, 22), rnd(-22, 22)));
                for (let i = 0; i < rndInt(1, 3); i++) g.add(createWarningSign(rnd(-22, 22), rnd(-22, 22), rnd(0, Math.PI * 2)));
                // ----- ART WORKER signs (2 to 3 per chunk) -----
                // For the spawn chunk (0,0), keep one sign at a fixed location near spawn,
                // then add additional random signs.
                if (cx === 0 && cz === 0) {
                    // Fixed sign near player start
                    g.add(createArtWorkersSign(0, -10));
                    // Add 1–2 more random signs in the same chunk
                    const extraCount = rndInt(1, 2);
                    for (let i = 0; i < extraCount; i++) {
                        g.add(createArtWorkersSign(rnd(-25, 25), rnd(-25, 25)));
                    }
                } else {
                    // For all other chunks: 2 to 3 signs
                    const signCount = rndInt(2, 3);
                    for (let i = 0; i < signCount; i++) {
                        g.add(createArtWorkersSign(rnd(-25, 25), rnd(-25, 25)));
                    }
                }
                for (let i = 0; i < rndInt(1, 4); i++) g.add(createHardhat(rnd(-22, 22), rnd(0.05, 0.5), rnd(-22, 22)));
                for (let i = 0; i < rndInt(0, 3); i++) g.add(createFireBarrel(rnd(-20, 20), rnd(-20, 20)));
                if (Math.random() > 0.5) g.add(createScaffold(rnd(-15, 15), rnd(-15, 15), rnd(6, 16), rnd(4, 8)));
                if (Math.random() > 0.65) g.add(createCraneArm(rnd(-10, 10), rnd(-10, 10)));
                g.position.set(cx * CHUNK, 0, cz * CHUNK);
                chunks.set(`${cx},${cz}`, g);
                scene.add(g);
                loaded.add(`${cx},${cz}`);
            }

            function updateChunks() {
                const pcx = Math.floor(camera.position.x / CHUNK);
                const pcz = Math.floor(camera.position.z / CHUNK);
                const R = 2;
                for (let x = -R; x <= R; x++) for (let z = -R; z <= R; z++) {
                    const key = `${pcx + x},${pcz + z}`;
                    if (!loaded.has(key)) createChunk(pcx + x, pcz + z);
                }
                loaded.forEach(key => {
                    const [cx, cz] = key.split(',').map(Number);
                    if (Math.max(Math.abs(cx - pcx), Math.abs(cz - pcz)) > R + 1) {
                        scene.remove(chunks.get(key));
                        chunks.delete(key); loaded.delete(key);
                    }
                });
            }

            // ---------- CONTROLS ----------
            const keys = {};
            document.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                if (e.key === ' ' && isGrounded) { vy = 0.28; isGrounded = false; }
                if (e.key !== ' ') e.preventDefault();
            });
            document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
            renderer.domElement.addEventListener('click', () => { if (!showTouchControls) renderer.domElement.requestPointerLock(); });

            let theta = 0, phi = 0;
            document.addEventListener('mousemove', e => {
                if (document.pointerLockElement !== renderer.domElement) return;
                theta -= e.movementX * 0.004;
                phi = Math.max(-1.2, Math.min(1.2, phi + e.movementY * 0.004));
            });

            // Touch joystick variables
            let moveVec = { x: 0, y: 0 };
            let lookVec = { x: 0, y: 0 };
            let moveTouchId = null, lookTouchId = null;

            if (showTouchControls) {
                const jMove = document.getElementById('joy-move');
                const jMoveKnob = document.getElementById('joy-move-knob');
                const jLook = document.getElementById('joy-look');
                const jLookKnob = document.getElementById('joy-look-knob');

                jMove.style.display = 'block';
                jLook.style.display = 'block';
                document.getElementById('hud').style.display = 'none';

                const updateMoveJoy = (t) => {
                    const r = jMove.getBoundingClientRect();
                    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
                    let dx = t.clientX - cx, dy = t.clientY - cy;
                    const dist = Math.min(Math.hypot(dx, dy), 50);
                    if (dist > 0) { dx = (dx / dist) * dist; dy = (dy / dist) * dist; }
                    moveVec = { x: dx / 50, y: dy / 50 };
                    jMoveKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                };
                jMove.addEventListener('touchstart', e => { e.preventDefault(); moveTouchId = e.changedTouches[0].identifier; updateMoveJoy(e.changedTouches[0]); });
                jMove.addEventListener('touchmove', e => { for (const t of e.changedTouches) if (t.identifier === moveTouchId) updateMoveJoy(t); });
                jMove.addEventListener('touchend', e => { moveTouchId = null; moveVec = { x: 0, y: 0 }; jMoveKnob.style.transform = 'translate(-50%,-50%)'; });

                const updateLookJoy = (t) => {
                    const r = jLook.getBoundingClientRect();
                    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
                    let dx = t.clientX - cx, dy = t.clientY - cy;
                    const dist = Math.min(Math.hypot(dx, dy), 50);
                    if (dist > 0) { dx = dx / dist * dist; dy = dy / dist * dist; }
                    lookVec = { x: dx / 50, y: dy / 50 };
                    jLookKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                };
                jLook.addEventListener('touchstart', e => { e.preventDefault(); lookTouchId = e.changedTouches[0].identifier; updateLookJoy(e.changedTouches[0]); });
                jLook.addEventListener('touchmove', e => { for (const t of e.changedTouches) if (t.identifier === lookTouchId) updateLookJoy(t); });
                jLook.addEventListener('touchend', e => { lookTouchId = null; lookVec = { x: 0, y: 0 }; jLookKnob.style.transform = 'translate(-50%,-50%)'; });
            }

            let vy = 0, isGrounded = true;
            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                const dt = Math.min(clock.getDelta(), 0.05);
                const spd = keys['shift'] ? 0.35 : 0.18;

                if (showTouchControls && lookTouchId !== null) {
                    theta -= lookVec.x * 0.045;
                    phi = Math.max(-1.2, Math.min(1.2, phi + lookVec.y * 0.045));
                }

                const fwd = new THREE.Vector3(Math.sin(theta), 0, Math.cos(theta));
                const rgt = new THREE.Vector3(Math.sin(theta + Math.PI / 2), 0, Math.cos(theta + Math.PI / 2));

                if (keys['w'] || keys['arrowup']) camera.position.addScaledVector(fwd, spd);
                if (keys['s'] || keys['arrowdown']) camera.position.addScaledVector(fwd, -spd);
                if (keys['a'] || keys['arrowleft']) camera.position.addScaledVector(rgt, spd);
                if (keys['d'] || keys['arrowright']) camera.position.addScaledVector(rgt, -spd);

                if (showTouchControls) {
                    camera.position.addScaledVector(fwd, -moveVec.y * spd);
                    camera.position.addScaledVector(rgt, -moveVec.x * spd);
                }

                vy -= 0.018;
                camera.position.y += vy;
                if (camera.position.y < 2.2) { camera.position.y = 2.2; vy = 0; isGrounded = true; }

                const look = new THREE.Vector3(Math.sin(theta) * Math.cos(phi), -Math.sin(phi), Math.cos(theta) * Math.cos(phi));
                camera.lookAt(camera.position.clone().add(look));
                updateChunks();
                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            updateChunks();
            animate();

            if (isDesktopNoTouch) {
                const hint = document.createElement('div');
                hint.className = 'desktop-hint';
                hint.textContent = '🖱️ CLICK & MOVE MOUSE | WASD + SPACE + SHIFT';
                document.body.appendChild(hint);
                document.addEventListener('pointerlockchange', () => {
                    hint.style.display = document.pointerLockElement ? 'none' : 'block';
                });
            }
        })();
    </script>
</body>
